<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>whois-extracter — domain detail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <nav>
    <a class="nav-brand" href="index.html">WHOIS-EXTRACTER</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="risk-board.html" class="nav-active">Risk Board</a>
      <a href="demo.html">Live Demo</a>
      <a href="https://github.com/fmfalgun/whois-extracter" target="_blank" rel="noopener noreferrer">GitHub ↗</a>
      <a href="https://fmfalgun.github.io" target="_blank" rel="noopener noreferrer">Portfolio ↗</a>
    </div>
  </nav>

  <!-- Domain name + contributor shown below nav -->
  <div class="domain-header">
    <span id="domain-name-display" class="domain-name-display">—</span>
    <span id="contributor-meta" class="domain-contributor"></span>
  </div>

  <div id="error-box"><span id="error-message"></span></div>

  <!-- Stats row -->
  <section id="stats-row" class="stats-row">
    <div class="stat-badge">
      <span class="stat-value" id="val-risk-score">—</span>
      <span class="stat-label">Risk Score</span>
    </div>
    <div class="stat-badge">
      <span class="stat-value" id="val-risk-level">—</span>
      <span class="stat-label">Risk Level</span>
    </div>
    <div class="stat-badge">
      <span class="stat-value" id="val-signals">—</span>
      <span class="stat-label">Signals Fired</span>
    </div>
    <div class="stat-badge">
      <span class="stat-value" id="val-age">—</span>
      <span class="stat-label">Domain Age (days)</span>
    </div>
  </section>

  <main id="results">

    <p id="queried-at-line">data as of <span id="queried-at">—</span></p>

    <section class="section" id="section-dates">
      <h2 class="section-title">[ // DATES ]</h2>
      <div class="infra-grid" id="dates-grid"></div>
    </section>

    <section class="section" id="section-infra">
      <h2 class="section-title">[ // INFRASTRUCTURE ]</h2>
      <div class="infra-grid" id="infra-grid"></div>
    </section>

    <section class="section" id="section-contacts">
      <h2 class="section-title">[ // REGISTRANT ]</h2>
      <div class="infra-grid" id="contacts-grid"></div>
    </section>

    <section class="section" id="section-signals">
      <h2 class="section-title">[ // RISK SIGNALS ]</h2>
      <div class="entry-list" id="signals-list"></div>
    </section>

  </main>

  <footer class="site-footer">
    <a href="risk-board.html">← risk board</a>
    &middot; <a href="index.html">home</a>
    &middot; <a href="https://github.com/fmfalgun/whois-extracter" target="_blank" rel="noopener noreferrer">GitHub ↗</a>
    &middot; refreshed monthly by GitHub Actions
  </footer>

  <script src="assets/js/domain.js"></script>
</body>
</html>
